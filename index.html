<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riyu QR Decryptor</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .header { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 20px; color: var(--primary); }

        #reader { width: 100%; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 15px; }

        .btn-scan {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 16px; /* Mencegah auto-zoom di iOS */
            box-sizing: border-box;
        }

        .btn-decrypt {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }

        #result { margin-top: 20px; padding: 15px; background: #334155; border-radius: 12px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Riyu Decryptor</div>
    
    <div id="reader"></div>
    <button class="btn-scan" onclick="startScanner()">📸 Scan Kamera Depan</button>

    <textarea id="qrInputText" placeholder="Data QR akan muncul di sini..."></textarea>
    <button class="btn-decrypt" onclick="decryptURL()">DECRYPT DATA</button>

    <div id="result">
        <small style="color: #94a3b8;">Hasil:</small><br>
        <a href="#" id="finalLink" style="color: #818cf8; word-break: break-all;" target="_blank"></a>
    </div>
</div>

<script>
    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: { exact: "user" } }, 
            { fps: 10, qrbox: 200 },
            (decodedText) => {
                document.getElementById('qrInputText').value = decodedText;
                html5QrCode.stop();
                decryptURL();
            }
        ).catch(() => {
            alert("Kamera depan tidak ditemukan. Mencoba kamera default...");
            // Fallback ke kamera default jika kamera depan "exact" tidak tersedia
            startDefaultCamera();
        });
    }

    function startDefaultCamera() {
        new Html5Qrcode("reader").start(
            { facingMode: "user" },
            { fps: 10, qrbox: 200 },
            (text) => { document.getElementById('qrInputText').value = text; }
        );
    }

    function decryptURL() {
        const textData = document.getElementById('qrInputText').value;
        const resultDiv = document.getElementById('result');
        const finalLink = document.getElementById('finalLink');

        if (textData) {
            resultDiv.style.display = "block";
            finalLink.innerText = textData;
            finalLink.href = textData;
        }
    }
</script>

</body>
</html>
